name: 🐛 Bug Report
description: Report something that doesn't work as expected
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in as much of the template below as possible.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, the device list shows...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: I expected the list to refresh and show...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. Logs / screenshots welcome.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Simple IoT version / commit
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: deploy
    attributes:
      label: Deployment
      options:
        - Docker Compose (default)
        - Local dev (mvn / pnpm)
        - Custom build
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, JDK version, Node version, browser if frontend bug.
      placeholder: |
        - OS: Ubuntu 22.04
        - JDK: Temurin 25
        - Node: 20.10
        - Browser: Chrome 130
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Backend log snippet, browser console, network panel, etc. Use code blocks.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I'm running a recent version (or built from `main`)
          required: true
