name: 💬 Question / Help
description: Ask a usage / setup question
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For longer-form discussion, please use [GitHub Discussions](https://github.com/dingdaoyi/simple-iot/discussions). Issues are reserved for bugs and features.

  - type: textarea
    id: question
    attributes:
      label: Your question
      placeholder: What are you trying to do? What have you tried?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Simple IoT version
      placeholder: "v0.1.0"
