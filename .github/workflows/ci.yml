name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 🛠️ Backend (Maven · Java 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Test and build with Maven
        run: mvn -B -ntp verify --file pom.xml

  frontend:
    name: 🎨 Frontend (Vue 3 · Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iot-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('iot-web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  docker:
    name: 🐳 Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build iot-server image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: iot-server/Dockerfile
          push: false
          tags: simple-iot/server:ci

      - name: Build iot-web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./iot-web
          file: iot-web/Dockerfile
          push: false
          tags: simple-iot/web:ci
