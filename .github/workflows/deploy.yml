name: Deploy to Demo

# 触发：push 到 main + 手动
on:
  push:
    branches: [main]
    paths:
      - 'iot-web/**'
      - 'docker-compose.yml'
      - 'deploy.sh'
      - 'scripts/backup.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-demo
  cancel-in-progress: false

jobs:
  deploy-web:
    name: Build iot-web on demo server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.repository == 'dingdaoyi/simple-iot'

    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          : "${SSH_KEY:?DEPLOY_SSH_KEY is required}"
          : "${SSH_HOST:?DEPLOY_HOST is required}"
          : "${SSH_USER:?DEPLOY_USER is required}"

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          for i in $(seq 1 10); do
            echo "ssh-keyscan attempt $i/10"
            if ssh-keyscan -T 10 -t ed25519,rsa -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/tmp/ssh-keyscan.err; then
              break
            fi
            cat /tmp/ssh-keyscan.err || true
            if [ "$i" = "10" ]; then
              echo "ssh-keyscan failed after 10 attempts"
              exit 1
            fi
            sleep 3
          done

          cat >> ~/.ssh/config <<EOF
          Host demo
            HostName $SSH_HOST
            User $SSH_USER
            Port 22
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            ConnectTimeout 10
            ConnectionAttempts 5
            ServerAliveInterval 15
            ServerAliveCountMax 4
          EOF

      - name: Trigger remote iot-web deploy
        env:
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REMOTE_LOG="/tmp/simple-iot-web-deploy-${TARGET_SHA}.log"
          REMOTE_SCRIPT="/tmp/simple-iot-web-deploy-${TARGET_SHA}.sh"
          REMOTE_STATUS="/tmp/simple-iot-web-deploy-${TARGET_SHA}.status"

          cat > /tmp/remote-deploy.sh <<'REMOTE'
          #!/usr/bin/env bash
          set -euo pipefail
          : "${TARGET_SHA:?TARGET_SHA is required}"
          cd /opt/simple-iot

          echo "[1/5] fetch target commit ${TARGET_SHA}"
          git fetch origin main
          git checkout main
          git reset --hard "${TARGET_SHA}"
          git log --oneline -1

          echo "[2/5] build iot-web on demo server"
          sudo docker compose build iot-web

          echo "[3/5] recreate iot-web container only"
          sudo docker compose up -d --no-deps --force-recreate iot-web

          echo "[4/5] wait healthy"
          for i in $(seq 1 30); do
            status=$(sudo docker inspect iot-web --format '{{.State.Health.Status}}' 2>/dev/null || echo "starting")
            echo "  attempt $i: $status"
            [ "$status" = "healthy" ] && break
            sleep 3
          done
          final_status=$(sudo docker inspect iot-web --format '{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
          [ "$final_status" = "healthy" ] || { echo "iot-web not healthy: $final_status"; exit 1; }

          echo "[5/5] local smoke test"
          curl -fsS -o /dev/null -w 'HTTP %{http_code} in %{time_total}s\n' http://localhost/
          REMOTE

          for i in $(seq 1 10); do
            echo "upload remote deploy script attempt $i/10"
            if scp /tmp/remote-deploy.sh demo:"$REMOTE_SCRIPT"; then
              break
            fi
            if [ "$i" = "10" ]; then
              echo "failed to upload remote deploy script"
              exit 1
            fi
            sleep 5
          done

          for i in $(seq 1 10); do
            echo "start remote deploy attempt $i/10"
            if ssh demo "chmod +x $REMOTE_SCRIPT && rm -f $REMOTE_STATUS $REMOTE_LOG && nohup bash -c 'TARGET_SHA=$TARGET_SHA $REMOTE_SCRIPT > $REMOTE_LOG 2>&1; echo \$? > $REMOTE_STATUS' </dev/null >/dev/null 2>&1 &"; then
              exit 0
            fi
            sleep 5
          done

          echo "failed to start remote deploy"
          exit 1

      - name: Poll remote deploy
        env:
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REMOTE_LOG="/tmp/simple-iot-web-deploy-${TARGET_SHA}.log"
          REMOTE_STATUS="/tmp/simple-iot-web-deploy-${TARGET_SHA}.status"

          for i in $(seq 1 90); do
            echo "--- poll $i/90 ---"
            set +e
            output=$(ssh demo "tail -80 '$REMOTE_LOG' 2>/dev/null; if [ -f '$REMOTE_STATUS' ]; then echo __STATUS__\$(cat '$REMOTE_STATUS'); fi" 2>&1)
            rc=$?
            set -e
            echo "$output"

            if [ "$rc" -ne 0 ]; then
              echo "ssh poll failed; retrying"
              sleep 10
              continue
            fi

            status=$(printf '%s\n' "$output" | awk -F__STATUS__ '/__STATUS__/ {print $2}' | tail -1)
            if [ -n "$status" ]; then
              if [ "$status" = "0" ]; then
                echo "remote deploy succeeded"
                exit 0
              fi
              echo "remote deploy failed with status $status"
              exit "$status"
            fi
            sleep 10
          done

          echo "timed out waiting for remote deploy"
          exit 1

      - name: Verify from public internet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          sleep 5
          HASH=$(curl -fsS "http://${DEPLOY_HOST}/" | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1)
          echo "deployed asset: $HASH"
          [ -n "$HASH" ] || { echo "FAIL: no asset hash in HTML"; exit 1; }

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
