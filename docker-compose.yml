services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: iot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${DATABASE:-simple}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./doc/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network


  # RustFS 对象存储 (S3 兼容)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: iot-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin123}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      # RustFS 官方健康检查
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - iot-network

  # 后端服务
  iot-server:
    build:
      context: .
      dockerfile: iot-server/Dockerfile
    container_name: iot-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # JVM 参数 - 解决 Arrow/Netty 兼容性问题
      JDK_JAVA_OPTIONS: ${JDK_JAVA_OPTIONS:---add-opens=java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED --sun-misc-unsafe-memory-access=allow}
      # 数据库配置
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      DATABASE: ${DATABASE:-simple}
      # InfluxDB 配置
      INFLUXDB_URL: ${INFLUXDB_URL:-http://influxdb:8181}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-iot_token_123456}
      # S3/RustFS 配置
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin123}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-iot-bucket}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://rustfs:9000}
    ports:
      - "${SERVER_PORT:-5010}:5010"
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-8083}:8083"
      - "${MQTT_HTTP_PORT:-18083}:18083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5010/iot/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - iot-network

  # 前端服务
  iot-web:
    build:
      context: ./iot-web
      dockerfile: Dockerfile
    container_name: iot-web
    restart: unless-stopped
    depends_on:
      iot-server:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - iot-network

volumes:
  postgres_data:
    driver: local
  rustfs_data:
    driver: local

networks:
  iot-network:
    driver: bridge
