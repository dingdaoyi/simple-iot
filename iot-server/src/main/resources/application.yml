server:
  port: 5010
  servlet:
    context-path: /iot

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

spring:
  application:
    name: iot-server
  jackson:
    default-property-inclusion: non_null
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=30s
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${DATABASE:simple}?stringtype=unspecified&binaryTransfer=true
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres123}
  autoconfigure:
    exclude:
      - org.springframework.boot.mail.autoconfigure.MailSenderAutoConfiguration
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.github.dingdaoyi.controller
      #https://gitee.com/xiaoym/knife4j/issues/IBI0DM swagger3.4.5bug暂时处理
  override-with-generic-response: false
knife4j:
  enable: true
  setting:
    language: zh_cn
sa-token:
  token-name: X-TOKEN
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: true
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  sso:
    skip-url:
      - /user/login
      - /dict/**
      - /driver/http/**

mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.CompositeEnumTypeHandler
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
mqtt:
  server:
    enabled: true
    name: ${spring.application.name}-server      # 名称，默认：Mica-Mqtt-Server
    heartbeat-timeout: 120000   # 心跳超时，单位毫秒，默认: 1000 * 120
    read-buffer-size: 8KB       # 接收数据的 buffer size，默认：8k
    max-bytes-in-message: 10MB  # 消息解析最大 bytes 长度，默认：10M
    auth:
      enable: true             # 是否开启 mqtt 认证
      username: mica            # mqtt 认证用户名
      password: mica            # mqtt 认证密码
    debug: true                 # 如果开启 prometheus 指标收集建议关闭
    stat-enable: true           # 开启指标收集，debug 和 prometheus 开启时需要打开，默认开启，关闭节省内存
    mqtt-listener:              # mqtt 监听器
      enable: true              # 是否开启，默认：false
      #      ip: "0.0.0.0"            # 服务端 ip 默认为空，0.0.0.0，建议不要设置
      port: 1883                # 端口，默认：1883
    mqtt-ssl-listener:          # mqtt ssl 监听器
      enable: false             # 是否开启，默认：false
      port: 8883                # 端口，默认：8883
      ssl:                      # ssl 配置，必须
        keystore-path:          # 必须参数：ssl keystore 目录，支持 classpath:/ 路径。
        keystore-pass:          # 必选参数：ssl keystore 密码
        truststore-path:        # 可选参数：ssl 双向认证 truststore 目录，支持 classpath:/ 路径。
        truststore-pass:        # 可选参数：ssl 双向认证 truststore 密码
        client-auth: none       # 是否需要客户端认证（双向认证），默认：NONE（不需要）
    ws-listener:                # websocket mqtt 监听器
      enable: true              # 是否开启，默认：false
      port: 8083                # websocket 端口，默认：8083
    wss-listener:               # websocket ssl mqtt 监听器
      enable: false             # 是否开启，默认：false
      port: 8084                # 端口，默认：8084
      ssl:                      # ssl 配置，必须
        keystore-path:          # 必须参数：ssl keystore 目录，支持 classpath:/ 路径。
        keystore-pass:          # 必选参数：ssl keystore 密码
        truststore-path:        # 可选参数：ssl 双向认证 truststore 目录，支持 classpath:/ 路径。
        truststore-pass:        # 可选参数：ssl 双向认证 truststore 密码
        client-auth: none       # 是否需要客户端认证（双向认证），默认：NONE（不需要）
    http-listener:
      enable: true
      port: 18083
      basic-auth:               # 基础认证
        enable: true
        username: simple
        password: simpleiot
sms:
  config-type: interface

logging:
  level:
    root: info
sample:
  iot:
    # 开启设备密钥认证
    enable-device-secret: true
    # 存储类型: file(本地存储) 或 s3(S3存储)
    storage-type: s3
    # 本地存储配置 (当 storage-type=file 时生效)
#    localstorage:
#      local-dir: ./file/upload
    # S3 存储配置 (当 storage-type=s3 时生效)
    s3storage:
      accessKeyId: ${S3_ACCESS_KEY_ID:your-access-key-id}
      secretAccessKey: ${S3_SECRET_ACCESS_KEY:your-secret-access-key}
      bucketName: ${S3_BUCKET_NAME:iot-bucket}
      region: ${S3_REGION:us-east-1}
      endpointUrl: ${S3_ENDPOINT:http://localhost:9000}  # 可选，用于 MinIO 或自建 S3
    driver:
      mqtt:
        mqtt-client-id-prefix: simple_
        topic-prefix: simple/iot
    device-channel-type: single
    influxdb:
      url: ${INFLUXDB_URL:http://127.0.0.1:8181}
      token: ${INFLUXDB_TOKEN:iot_token_123456}
      prop-database: prop_data
      event-database: even_data
      database: ${INFLUXDB_DATABASE:simple}
